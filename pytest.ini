[pytest]
testpaths = app/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    -ra
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=10
markers =
    unit: Unit tests (fast, no DB)
    integration: Integration tests (requires DB)
    slow: Slow tests (skip in CI if needed)