version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ecoflow_user
      POSTGRES_PASSWORD: ecoflow_pass
      POSTGRES_DB: ecoflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ecoflow_user:ecoflow_pass@db:5432/ecoflow_db
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data: